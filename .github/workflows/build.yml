name: pg_timeseries TSS plugin
run-name: Build OpenNMS pgtimeseries plugin
on:
  push:
    branches: ['**']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:

jobs:
  # Runs on every push (any branch) and on version tags. Compiles and runs the tests against each
  # targeted OpenNMS Integration API version.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-version: ['1.6.1', '2.0.0']
    steps:
      - name: Prepare env
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk maven
      - uses: actions/checkout@v4
      - name: Add workspace to git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Run tests (API ${{ matrix.api-version }})
        run: mvn -B --no-transfer-progress -Dopennms.api.version=${{ matrix.api-version }} test

  # Builds the kar and publishes a release. Only runs for tag pushes matching v<major>.<minor>.<patch>,
  # and only after the tests pass.
  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      # Build (and release) one kar per targeted OpenNMS Integration API version.
      matrix:
        api-version: ['1.6.1', '2.0.0']
    steps:
      - name: Prepare env
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk maven
      - uses: actions/checkout@v4
      - name: Add workspace to git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build it (API ${{ matrix.api-version }})
        run: mvn -B --no-transfer-progress -DskipTests=true -Dopennms.api.version=${{ matrix.api-version }} clean install
      - name: Persist build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennms-pgtimeseries-tss-plugin-opa-v${{ matrix.api-version }}.kar
          path: ./assembly/kar/target/opennms-pgtimeseries-tss-plugin-opa-v${{ matrix.api-version }}.kar
      - name: Release ${{ github.ref_name }}
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            ./assembly/kar/target/opennms-pgtimeseries-tss-plugin-opa-v${{ matrix.api-version }}.kar
