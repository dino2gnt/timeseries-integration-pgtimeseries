name: pg_timeseries TSS plugin
run-name: Build OpenNMS pgtimeseries plugin
on:
  push:
    branches: ['**']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:

jobs:
  # Runs on every push (any branch) and on version tags. Compiles and runs the tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare env
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk maven
      - uses: actions/checkout@v4
      - name: Add workspace to git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Run tests
        run: mvn -B --no-transfer-progress test

  # Builds the kar and publishes a release. Only runs for tag pushes matching v<major>.<minor>.<patch>,
  # and only after the tests pass.
  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prepare env
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk maven
      - uses: actions/checkout@v4
      - name: Add workspace to git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build it
        run: mvn -B --no-transfer-progress -DskipTests=true clean install
      - name: Persist build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennms-pgtimeseries-tss-plugin.kar
          path: ./assembly/kar/target/opennms-pgtimeseries-tss-plugin.kar
      - name: Release ${{ github.ref_name }}
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            ./assembly/kar/target/opennms-pgtimeseries-tss-plugin.kar
